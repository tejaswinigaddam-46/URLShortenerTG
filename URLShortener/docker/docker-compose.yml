# docker/docker-compose.yml

services:
  # 1. The .NET Web API Service
  app:
    # Use the local Dockerfile to build the image
    build:
      context: ../../  # Changed from ../ to ../../ to include the root directory with URLShortener.sln
      dockerfile: URLShortener/docker/api.Dockerfile  # Updated path to the Dockerfile
    # Map the container port (e.g., 8080) to the host port (e.g., 5001)
    ports:
      - "5001:8080"
    # Ensure the API service waits for the database and cache to be healthy
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    env_file:
      - .env
    # Environment variables for connection strings and settings
    environment:
      # These must match what your .NET config/code expects
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:8080}
      - ConnectionStrings:PostgresConnection=Host=${POSTGRES_HOST:-db};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings:RedisConnection=${REDIS_HOST:-cache}:${REDIS_PORT:-6379},allowAdmin=${REDIS_ALLOWADMIN:-true}
    # Optional: If you need to debug or apply changes without full rebuild
    # volumes:
    #   - ./src:/app/src 

  # 2. The PostgreSQL Database Service
  db:
    image: postgres:16-alpine # Use a lightweight, stable Postgres image
    restart: always
    env_file:
      - .env
    environment:
      # IMPORTANT: Match these with the API service's connection string
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # Map container port to host port (optional, good for connecting client tools)
    ports:
      - "5432:5432"
    # Persist the data outside the container
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount local init scripts so the DB is created on first initialization
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck: # Define a health check for 'depends_on' in the 'app' service
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. The Redis Cache Service
  cache:
    image: redis:7-alpine # Use a lightweight, stable Redis image
    restart: always
    env_file:
      - .env
    # Optional: Map container port to host port
    ports:
      - "6379:6379"
    # Persist the Redis data (optional, only if you need persistence)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes # Ensure data is saved (optional)

# Define named volumes for data persistence
volumes:
  postgres_data:
  redis_data: